<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="220" viewBox="0 0 1280 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="220" fill="url(#bg)" rx="12"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Lock icon -->
  <g transform="translate(80, 62)">
    <rect x="20" y="35" width="60" height="50" rx="6" fill="#58a6ff" opacity="0.9"/>
    <path d="M50 10C35 10 22 20 22 38v15h56V38c0-18-13-28-28-28z" fill="none" stroke="#58a6ff" stroke-width="5" opacity="0.9"/>
    <circle cx="50" cy="55" r="8" fill="#0d1117"/>
    <rect x="47" y="55" width="6" height="15" rx="3" fill="#0d1117"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(220, 82)">
    <line x1="0" y1="20" x2="100" y2="20" stroke="#30363d" stroke-width="3"/>
    <polygon points="95,12 105,20 95,28" fill="#30363d"/>
  </g>

  <!-- Code icon -->
  <g transform="translate(370, 55)">
    <rect x="0" y="0" width="100" height="110" rx="8" fill="#161b22"/>
    <rect x="8" y="8" width="84" height="94" rx="4" fill="#0d1117"/>
    <circle cx="16" cy="14" r="3" fill="#f85149"/>
    <circle cx="26" cy="14" r="3" fill="#d29922"/>
    <circle cx="36" cy="14" r="3" fill="#3fb950"/>
    <text x="14" y="40" font-family="monospace" font-size="11" fill="#8b949e">
      <tspan x="14" dy="0">$ codex</tspan>
      <tspan x="14" dy="14" fill="#3fb950">✓ auth_ok</tspan>
    </text>
  </g>

  <!-- Title -->
  <text x="520" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#e6edf3">Codex Auth Session Refresh</text>

  <!-- Subtitle -->
  <text x="520" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e">Refresh your Codex CLI auth from ChatGPT — automagically</text>

  <!-- Description boxes -->
  <g transform="translate(520, 145)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#1f6feb"/>
    <text x="90" y="25" font-family="system-ui" font-size="14" fill="white" text-anchor="middle" font-weight="600">🔐 Secure</text>

    <rect x="195" y="0" width="180" height="40" rx="20" fill="#238636"/>
    <text x="285" y="25" font-family="system-ui" font-size="14" fill="white" text-anchor="middle" font-weight="600">⚡ Auto-refresh</text>

    <rect x="390" y="0" width="180" height="40" rx="20" fill="#da3633"/>
    <text x="480" y="25" font-family="system-ui" font-size="14" fill="white" text-anchor="middle" font-weight="600">🪟 Windows-first</text>
  </g>

  <!-- Version badge bottom right -->
  <g transform="translate(1050, 170)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#21262d"/>
    <text x="90" y="23" font-family="monospace" font-size="13" fill="#3fb950" text-anchor="middle">v1.0.0 · MIT</text>
  </g>
</svg>
