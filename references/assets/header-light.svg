<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="220" viewBox="0 0 1280 220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="50%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="220" fill="url(#bg)" rx="12"/>

  <!-- Accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- Lock icon -->
  <g transform="translate(80, 62)">
    <rect x="20" y="35" width="60" height="50" rx="6" fill="#4285F4" opacity="0.9"/>
    <path d="M50 10C35 10 22 20 22 38v15h56V38c0-18-13-28-28-28z" fill="none" stroke="#4285F4" stroke-width="5" opacity="0.9"/>
    <circle cx="50" cy="55" r="8" fill="#fff"/>
    <rect x="47" y="55" width="6" height="15" rx="3" fill="#fff"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(220, 82)">
    <line x1="0" y1="20" x2="100" y2="20" stroke="#adb5bd" stroke-width="3"/>
    <polygon points="95,12 105,20 95,28" fill="#adb5bd"/>
  </g>

  <!-- Code icon -->
  <g transform="translate(370, 55)">
    <rect x="0" y="0" width="100" height="110" rx="8" fill="#212529"/>
    <rect x="8" y="8" width="84" height="94" rx="4" fill="#343a40"/>
    <circle cx="16" cy="14" r="3" fill="#ff6b6b"/>
    <circle cx="26" cy="14" r="3" fill="#ffd43b"/>
    <circle cx="36" cy="14" r="3" fill="#69db7c"/>
    <text x="14" y="40" font-family="monospace" font-size="11" fill="#adb5bd">
      <tspan x="14" dy="0">$ codex</tspan>
      <tspan x="14" dy="14" fill="#69db7c">✓ auth_ok</tspan>
    </text>
  </g>

  <!-- Title -->
  <text x="520" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#1a1a2e">Codex Auth Session Refresh</text>

  <!-- Subtitle -->
  <text x="520" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#495057">Refresh your Codex CLI auth from ChatGPT — automagically</text>

  <!-- Description boxes -->
  <g transform="translate(520, 145)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#4285F4"/>
    <text x="90" y="25" font-family="system-ui" font-size="14" fill="white" text-anchor="middle" font-weight="600">🔐 Secure</text>

    <rect x="195" y="0" width="180" height="40" rx="20" fill="#34A853"/>
    <text x="285" y="25" font-family="system-ui" font-size="14" fill="white" text-anchor="middle" font-weight="600">⚡ Auto-refresh</text>

    <rect x="390" y="0" width="180" height="40" rx="20" fill="#EA4335"/>
    <text x="480" y="25" font-family="system-ui" font-size="14" fill="white" text-anchor="middle" font-weight="600">🪟 Windows-first</text>
  </g>

  <!-- Version badge bottom right -->
  <g transform="translate(1050, 170)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#212529"/>
    <text x="90" y="23" font-family="monospace" font-size="13" fill="#69db7c" text-anchor="middle">v1.0.0 · MIT</text>
  </g>
</svg>
