name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate package.json structure
        run: |
          node - <<'NODE'
          const pkg = require('./scripts/package.json');
          const required = ['name', 'version', 'description', 'scripts', 'dependencies'];

          for (const key of required) {
            if (!pkg[key]) {
              throw new Error(`Missing package.json field: ${key}`);
            }
          }

          console.log('[OK] package.json validated');
          NODE

  powershell-style:
    name: PowerShell Script Analysis
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          $results = @()
          Get-ChildItem -Path . -Filter *.ps1 -Recurse | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            if ($content.Length -eq 0) {
              $results += [PSCustomObject]@{ File = $_.Name; Status = 'EMPTY' }
            } else {
              $results += [PSCustomObject]@{ File = $_.Name; Status = 'OK'; Lines = (($content -split "`n").Count) }
            }
          }
          $results | Format-Table -AutoSize
          if ($results.Status -contains 'EMPTY') { exit 1 }

      - name: Verify PowerShell syntax
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter *.ps1 -Recurse | ForEach-Object {
            $errors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors)
            if ($errors) {
              Write-Error "Syntax errors in $($_.Name): $errors"
              exit 1
            }
            Write-Host "[OK] $($_.Name) syntax valid"
          }

  markdown:
    name: README Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify README exists and has content
        run: |
          if [ ! -f README.md ]; then
            echo "::error::README.md not found"
            exit 1
          fi

          LINES=$(wc -l < README.md)
          if [ "$LINES" -lt 50 ]; then
            echo "::error::README.md too short ($LINES lines)"
            exit 1
          fi

          echo "[OK] README.md - $LINES lines"

      - name: Verify SECURITY.md exists
        run: |
          if [ ! -f SECURITY.md ]; then
            echo "::error::SECURITY.md not found"
            exit 1
          fi

          echo "[OK] SECURITY.md found"
